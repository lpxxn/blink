openapi: 3.0.3
info:
  title: Blink HTTP API
  description: |
    本仓库 HTTP 接口的 OpenAPI 描述；与 `infrastructure/interface/http/` 及 `cmd/main.go` 中的路由一致。

    **`POST /auth/register`**：始终挂载（见 `cmd/main.go`），用于邮箱密码注册并建立 `builtin` 身份绑定。

    **内置 IdP**：`/auth/idp/*` 以及 OAuth 提供方 **`builtin`** 仅在配置了 `BLINK_PUBLIC_BASE_URL`、`BLINK_OAUTH_CLIENT_SECRET` 等环境变量时启用；未配置时上述路径返回 **404**，但不影响 `/auth/register`。

    **代码生成**：仅带标签 `servergen` 的操作会由 oapi-codegen 生成 Gin 注册代码与 `ServerInterface` 方法；其余路径为手写路由，此处仅作文档。

    **社交与管理**：`/api/*` 帖子与评论、`/admin/api/*` 超级管理员接口为手写路由（见 `cmd/main.go`），OpenAPI 中 `social` / `admin` 标签描述之。
  version: 0.0.0
servers:
  - url: http://127.0.0.1:11110
    description: 本地开发（默认 BLINK_HTTP_ADDR=:11110）
  - url: http://localhost:11110
    description: 本地开发（localhost）
  - url: "http://127.0.0.1:{port}"
    description: 本地其它端口（与当前 BLINK_HTTP_ADDR 一致，在 Swagger 里改 port）
    variables:
      port:
        default: "11110"
  - url: /
    description: 与 Swagger UI 同源（把文档托管在本 API 上时用此项）
tags:
  - name: system
    description: 运维与健康检查
  - name: oauth
    description: 第三方 / 内置 OAuth2 登录入口（`/auth/oauth`）
  - name: idp
    description: 内置 OAuth2 授权服务（Authorization Server）
  - name: auth
    description: 账号注册（默认即挂载，不依赖自建 IdP）
  - name: servergen
    description: 参与 oapi-codegen Gin 生成的操作（勿删此标签于已生成路径上）
  - name: social
    description: 帖子流、分类、评论、图片上传（手写路由，见 cmd/main.go）
  - name: admin
    description: 超级管理员 JSON API（需会话且 users.role=super_admin）

paths:
  /health:
    get:
      operationId: getHealth
      tags: [system, servergen]
      summary: 健康检查（JSON）
      responses:
        "200":
          description: 服务可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /healthz:
    get:
      operationId: getHealthz
      tags: [system]
      summary: 健康检查（纯文本，探活）
      responses:
        "200":
          description: 正文为字面量 `ok`
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /auth/oauth/{provider}/login:
    get:
      operationId: oauthLoginRedirect
      tags: [oauth]
      summary: 发起 OAuth 登录
      description: 重定向至对应 `provider` 的授权页；成功时为 302。
      parameters:
        - $ref: "#/components/parameters/OAuthProvider"
        - name: next
          in: query
          required: false
          description: 登录成功后回跳路径（由应用内状态保存，完成回调后重定向）
          schema:
            type: string
      responses:
        "302":
          description: 重定向至 IdP 授权 URL
          headers:
            Location:
              schema:
                type: string
        "400":
          description: 未知 provider 或参数错误；正文为纯文本
          content:
            text/plain:
              schema:
                type: string

  /auth/oauth/{provider}/callback:
    get:
      operationId: oauthCallback
      tags: [oauth]
      summary: OAuth 回调
      description: |
        用授权码换会话，设置 HttpOnly Cookie `blink_session`，再 302 到 `next`。
      parameters:
        - $ref: "#/components/parameters/OAuthProvider"
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: 重定向到登录前保存的 `next`
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              description: HttpOnly `blink_session`
              schema:
                type: string
        "400":
          description: 缺少 code/state 或换票失败
          content:
            text/plain:
              schema:
                type: string

  /auth/idp/authorize:
    get:
      operationId: idpAuthorizeGet
      tags: [idp]
      summary: 授权页（HTML）
      description: OAuth2 授权端点；返回登录表单 HTML。
      parameters:
        - $ref: "#/components/parameters/OAuthClientId"
        - $ref: "#/components/parameters/OAuthRedirectURI"
        - $ref: "#/components/parameters/OAuthResponseType"
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 登录页 HTML
          content:
            text/html:
              schema:
                type: string
        "400":
          description: 参数不合法或缺少 state
          content:
            text/plain:
              schema:
                type: string
    post:
      operationId: idpAuthorizePost
      tags: [idp]
      summary: 提交登录表单
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - client_id
                - redirect_uri
                - state
                - response_type
                - email
                - password
              properties:
                client_id:
                  type: string
                redirect_uri:
                  type: string
                state:
                  type: string
                response_type:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "302":
          description: 登录成功，重定向回客户端 `redirect_uri`（带授权码）
          headers:
            Location:
              schema:
                type: string
        "400":
          description: 表单解析失败
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: 邮箱或密码错误
          content:
            text/plain:
              schema:
                type: string

  /auth/idp/token:
    post:
      operationId: idpToken
      tags: [idp]
      summary: OAuth2 Token 端点
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - grant_type
                - code
                - redirect_uri
                - client_id
                - client_secret
              properties:
                grant_type:
                  type: string
                  example: authorization_code
                code:
                  type: string
                redirect_uri:
                  type: string
                client_id:
                  type: string
                client_secret:
                  type: string
      responses:
        "200":
          description: 访问令牌
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthTokenResponse"
        "400":
          description: 换票失败（如 `invalid_grant`）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthTokenError"
        "405":
          description: 非 POST

  /auth/idp/userinfo:
    get:
      operationId: idpUserInfo
      tags: [idp]
      summary: OpenID 风格 UserInfo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 当前用户信息
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"
        "401":
          description: 缺少或无效的 Bearer Token
          content:
            text/plain:
              schema:
                type: string

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: 用户注册
      description: |
        路由**始终挂载**。成功时 `201`；若进程内为 `RegisterService` 配置了事务与会话存储，会设置 Cookie `blink_session`，且 JSON 可含 `session_token`、`session_cookie` 字段。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: 注册成功
          headers:
            Set-Cookie:
              description: 若启用会话则下发 HttpOnly `blink_session`
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: 请求体非法、密码过短或邮箱格式无效
          content:
            text/plain:
              schema:
                type: string
        "405":
          description: 非 POST
        "409":
          description: 邮箱已注册
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: 服务器错误
          content:
            text/plain:
              schema:
                type: string

  /api/categories:
    get:
      operationId: listCategories
      tags: [social]
      summary: 分类列表
      responses:
        "200":
          description: JSON `{ "categories": [...] }`

  /api/posts:
    get:
      operationId: listPosts
      tags: [social]
      summary: 公开帖子流
      description: Query `category_id`、`uncategorized=1`、`cursor`（上一页最后一条 id）、`limit`。
      responses:
        "200":
          description: `{ "posts": [...], "next_cursor": int64|null }`
    post:
      operationId: createPost
      tags: [social]
      summary: 发帖（需登录）
      security:
        - sessionCookie: []
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                category_id:
                  type: integer
                  format: int64
                  nullable: true
                images:
                  type: array
                  items:
                    type: string
                draft:
                  type: boolean
      responses:
        "201":
          description: 帖子 JSON

  /api/posts/{id}:
    get:
      operationId: getPost
      tags: [social]
      summary: 帖子详情（可选登录；作者可看草稿/非公开）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 帖子 JSON
        "404":
          description: 不存在或对当前访客不可见
    patch:
      operationId: patchPost
      tags: [social]
      summary: 修改自己的帖子
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                category_id:
                  type: integer
                  format: int64
                clear_category:
                  type: boolean
                images:
                  type: array
                  items:
                    type: string
                status:
                  type: integer
      responses:
        "200":
          description: 更新后帖子
    delete:
      operationId: deletePost
      tags: [social]
      summary: 删除自己的帖子（软删）
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: 成功

  /api/me/posts:
    get:
      operationId: listMyPosts
      tags: [social]
      summary: 我的帖子
      security:
        - sessionCookie: []
        - bearerAuth: []
      description: Query `include_draft=1`、`cursor`、`limit`。
      responses:
        "200":
          description: 同 listPosts

  /api/posts/{id}/replies:
    get:
      operationId: listReplies
      tags: [social]
      summary: 评论列表（仅已发布且公开的根帖）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: `{ "replies": [...], "next_cursor" }`
    post:
      operationId: createReply
      tags: [social]
      summary: 发表评论
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                parent_reply_id:
                  type: integer
                  format: int64
                  nullable: true
      responses:
        "201":
          description: 评论 JSON

  /api/replies/{id}:
    delete:
      operationId: deleteReply
      tags: [social]
      summary: 删除自己的评论
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: 成功

  /api/uploads:
    post:
      operationId: uploadImage
      tags: [social]
      summary: 上传图片（multipart 字段 `file`）
      security:
        - sessionCookie: []
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: `{ "url": "/uploads/{user_id}/{file}" }`

  /admin/api/overview:
    get:
      operationId: adminOverview
      tags: [admin]
      summary: 概览统计
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        "200":
          description: user_count, post_count, posts_today, category_count

  /admin/api/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: 用户列表
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        "200":
          description: `{ "users": [...] }`

  /admin/api/users/{id}:
    patch:
      operationId: adminPatchUser
      tags: [admin]
      summary: 修改用户 status / role
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: integer
                role:
                  type: string
      responses:
        "204":
          description: 成功

  /admin/api/posts:
    get:
      operationId: adminListPosts
      tags: [admin]
      summary: 全站帖子筛选
      security:
        - sessionCookie: []
        - bearerAuth: []
      description: Query `user_id`、`category_id`、`moderation_flag`、`include_deleted`、`offset`、`limit`。
      responses:
        "200":
          description: `{ "posts": [...], "total" }`

  /admin/api/posts/{id}:
    patch:
      operationId: adminPatchPost
      tags: [admin]
      summary: 审核字段与 status
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                moderation_flag:
                  type: integer
                moderation_note:
                  type: string
                status:
                  type: integer
      responses:
        "200":
          description: 帖子 JSON

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: access_token
    sessionCookie:
      type: apiKey
      in: cookie
      name: blink_session

  parameters:
    OAuthProvider:
      name: provider
      in: path
      required: true
      description: 提供方标识，如 `google`、`builtin`、测试用 `test` 等
      schema:
        type: string
    OAuthClientId:
      name: client_id
      in: query
      required: true
      schema:
        type: string
    OAuthRedirectURI:
      name: redirect_uri
      in: query
      required: true
      schema:
        type: string
    OAuthResponseType:
      name: response_type
      in: query
      required: true
      schema:
        type: string
        example: code

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        name:
          type: string

    RegisterResponse:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: integer
          format: int64
        session_token:
          type: string
          description: 若启用会话注册则返回；同时通过 Set-Cookie 下发
        session_cookie:
          type: string
          description: 固定为 `blink_session`，与 Cookie 名一致

    OAuthTokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: 过期时间（秒）

    OAuthTokenError:
      type: object
      properties:
        error:
          type: string
          example: invalid_grant

    UserInfoResponse:
      type: object
      required: [sub, email, name]
      properties:
        sub:
          type: string
        email:
          type: string
        name:
          type: string
