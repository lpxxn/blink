<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>后台设置 — Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
</head>
<body class="blink-page">
  <div class="shell shell-wide">
    <nav class="top-nav">
      <a class="brand" href="/web/index.html">Blink</a>
      <a href="/web/index.html">首页</a>
      <a href="/web/register.html">注册</a>
      <a href="/web/feed.html">帖子流</a>
      <a href="/web/compose.html">发帖</a>
      <a href="/web/mine.html">我的</a>
      <a href="/web/messages.html">消息</a>
      <a href="/web/admin.html" data-blink-nav="admin" hidden>管理</a>
    </nav>

    <div id="gate">
      <h1 class="page-title">后台设置</h1>
      <div class="card" style="margin-top:0.75rem">
        <p class="page-lead" id="gate-lead" style="margin-top:0">正在验证权限…</p>
        <p style="margin:1rem 0 0">
          <a class="btn btn-primary" href="/web/index.html">去首页登录</a>
          <a class="btn btn-secondary" href="/web/admin.html" style="margin-left:0.35rem">返回管理后台</a>
        </p>
      </div>
    </div>

    <div id="app" hidden>
      <h1 class="page-title">后台设置</h1>
      <p class="page-lead" style="margin-top:0">仅 super_admin 可见；配置项修改后立即生效。</p>
      <p id="err" class="err" role="alert"></p>

      <div class="card" style="margin-top:0.75rem">
        <h2 class="section-title" style="margin-top:0">发布后敏感词处理模式</h2>
        <p class="page-lead" style="margin-top:0">帖子发布后由后台异步扫描；命中敏感词时，可选择自动下架或仅标记待审查。</p>
        <div class="field" style="margin-bottom:0.75rem">
          <label for="mode">模式</label>
          <select id="mode">
            <option value="review">管理员审查后下架（先标记违规）</option>
            <option value="auto_remove">自动下架（命中后立即下架）</option>
          </select>
        </div>
        <div class="btn-row" style="flex-wrap:wrap; gap:0.5rem">
          <button type="button" class="btn btn-primary" id="save">保存</button>
          <button type="button" class="btn btn-secondary btn-sm" id="reload">刷新</button>
        </div>
        <p class="page-lead" style="margin-top:0.75rem" id="mode-hint"></p>
      </div>

      <div class="card" style="margin-top:0.75rem">
        <h2 class="section-title" style="margin-top:0">更多设置</h2>
        <p class="page-lead" style="margin-top:0">后续其他后台配置项会逐步迁移到这里。</p>
      </div>
    </div>
  </div>

  <script>
    var API = '';

    function setGate(msg) {
      document.getElementById('gate-lead').textContent = msg;
      document.getElementById('gate').hidden = false;
      document.getElementById('app').hidden = true;
    }

    function setAuthed() {
      document.getElementById('gate').hidden = true;
      document.getElementById('app').hidden = false;
    }

    function showErr(e) {
      document.getElementById('err').textContent = String(e && e.message ? e.message : e);
    }

    function ensureAdminJson(r, label) {
      if (r.status === 403) return Promise.reject(new Error('需要 super_admin 登录'));
      if (r.status === 401) return Promise.reject(new Error('请先登录'));
      if (!r.ok) {
        return r.text().then(function (t) {
          throw new Error(label + ' ' + r.status + (t ? ': ' + t : ''));
        });
      }
      return r.json();
    }

    function loadMe() {
      return fetch(API + '/api/me', { credentials: 'include' })
        .then(function (r) {
          if (r.status === 401) return null;
          if (!r.ok) return null;
          return r.json();
        })
        .then(function (me) {
          if (!me || !me.user_id) return null;
          return me;
        })
        .catch(function () { return null; });
    }

    function loadMode() {
      document.getElementById('err').textContent = '';
      return fetch(API + '/admin/api/settings/sensitive_post_mode', { credentials: 'include' })
        .then(function (r) { return ensureAdminJson(r, '加载失败'); })
        .then(function (d) {
          var v = (d && d.mode) ? String(d.mode) : 'review';
          document.getElementById('mode').value = v;
          document.getElementById('mode-hint').textContent =
            v === 'auto_remove' ? '当前：自动下架（命中后会立即下架并通知作者）' : '当前：管理员审查（命中后先标记违规并通知管理员）';
        })
        .catch(showErr);
    }

    function saveMode() {
      document.getElementById('err').textContent = '';
      var v = String(document.getElementById('mode').value || 'review');
      return fetch(API + '/admin/api/settings/sensitive_post_mode', {
        method: 'PUT',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: v })
      }).then(function (r) {
        if (r.status === 403) throw new Error('需要 super_admin');
        if (r.status === 401) throw new Error('请先登录');
        if (r.status === 204) return;
        return r.text().then(function (t) { throw new Error(t || String(r.status)); });
      }).then(function () {
        return loadMode();
      }).catch(showErr);
    }

    function init() {
      setGate('正在验证权限…');
      loadMe().then(function (me) {
        if (!me) return setGate('请先登录后再访问');
        if (me.role !== 'super_admin') return setGate('需要 super_admin 权限');
        setAuthed();
        var nav = document.querySelector('[data-blink-nav="admin"]');
        if (nav) nav.hidden = false;
        loadMode();
      });
      document.getElementById('save').onclick = saveMode;
      document.getElementById('reload').onclick = loadMode;
    }

    init();
  </script>
</body>
</html>
