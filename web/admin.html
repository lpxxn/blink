<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理 — Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
</head>
<body class="blink-page">
  <div class="shell shell-xwide">
    <nav class="top-nav">
      <a class="brand" href="/web/index.html">Blink</a>
      <a href="/web/index.html">首页</a>
      <a href="/web/register.html">注册</a>
      <a href="/web/feed.html">帖子流</a>
      <a href="/web/admin.html" class="nav-active">管理</a>
    </nav>

    <h1 class="page-title">超级管理</h1>
    <p id="err" class="err" role="alert"></p>

    <h2 class="section-title">概览</h2>
    <pre id="overview" class="code-block">加载中…</pre>

    <h2 class="section-title">用户（最近 50）</h2>
    <div class="data-table-wrap">
      <table class="data-table" id="users">
        <thead><tr><th>ID</th><th>邮箱</th><th>角色</th><th>状态</th><th>最近登录</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <h2 class="section-title">帖子（最近 20）</h2>
    <div class="data-table-wrap">
      <table class="data-table" id="posts">
        <thead><tr><th>ID</th><th>用户</th><th>用户ID</th><th>审核</th><th>状态</th><th>摘要</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
  <script>
    var API = '';

    function loadAll() {
      document.getElementById('err').textContent = '';
      fetch(API + '/admin/api/overview', { credentials: 'include' })
        .then(function (r) {
          if (r.status === 403) throw new Error('需要 super_admin 登录');
          if (r.status === 401) throw new Error('请先登录');
          if (!r.ok) throw new Error('overview ' + r.status);
          return r.json();
        })
        .then(function (d) {
          document.getElementById('overview').textContent = JSON.stringify(d, null, 2);
        })
        .catch(function (e) {
          document.getElementById('err').textContent = String(e);
          document.getElementById('overview').textContent = '';
        });

      fetch(API + '/admin/api/users?limit=50', { credentials: 'include' })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var tb = document.querySelector('#users tbody');
          tb.innerHTML = '';
          (d.users || []).forEach(function (u) {
            var tr = document.createElement('tr');
            [
              String(u.id),
              u.email || '',
              u.role || '',
              String(u.status),
              u.last_login_at || '-'
            ].forEach(function (cell) {
              var td = document.createElement('td');
              td.textContent = cell;
              tr.appendChild(td);
            });
            tb.appendChild(tr);
          });
        });

      fetch(API + '/admin/api/posts?limit=20', { credentials: 'include' })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var tb = document.querySelector('#posts tbody');
          tb.innerHTML = '';
          (d.posts || []).forEach(function (p) {
            var tr = document.createElement('tr');
            var tdId = document.createElement('td');
            tdId.textContent = String(p.id != null ? p.id : '');
            tr.appendChild(tdId);
            var nameTd = document.createElement('td');
            var disp = p.user_name != null && String(p.user_name).trim() !== '' ? String(p.user_name).trim() : '—';
            nameTd.textContent = disp;
            tr.appendChild(nameTd);
            var uidTd = document.createElement('td');
            uidTd.textContent = String(p.user_id != null ? p.user_id : '');
            tr.appendChild(uidTd);
            ['moderation_flag', 'status'].forEach(function (k) {
              var td = document.createElement('td');
              td.textContent = String(p[k] != null ? p[k] : '');
              tr.appendChild(td);
            });
            var tdSum = document.createElement('td');
            tdSum.textContent = (p.body || '').slice(0, 60);
            tr.appendChild(tdSum);
            tb.appendChild(tr);
          });
        });
    }

    loadAll();
  </script>
</body>
</html>
