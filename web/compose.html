<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>发帖 — Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
  <link rel="stylesheet" href="/web/assets/css/pages/compose.css" />
</head>
<body class="blink-page">
  <div class="shell shell-wide">
    <blink-nav active="compose"></blink-nav>

    <h1 class="page-title">发帖</h1>
    <p class="page-lead">
      支持 Markdown；工具条 / 键盘快捷键 / 拖拽或粘贴图片上传。
      正文里的 <code>![图片](…)</code> 与右侧图片面板保持同步——在面板点「×」会自动清理正文里对应的引用。
    </p>

    <div id="banner-mount"></div>

    <div class="card">
      <div id="editor-mount"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="/web/assets/js/md.js"></script>
  <script src="/web/assets/js/api.js"></script>
  <script src="/web/assets/js/ui.js"></script>
  <script src="/web/assets/js/nav.js"></script>
  <script src="/web/assets/js/post-editor.js"></script>
  <script src="/web/assets/js/pages/compose.js"></script>
</body>
</html>
