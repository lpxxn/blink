<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>发帖 — Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
</head>
<body class="blink-page">
  <div class="shell shell-wide">
    <nav class="top-nav">
      <a class="brand" href="/web/index.html">Blink</a>
      <a href="/web/index.html">首页</a>
      <a href="/web/register.html">注册</a>
      <a href="/web/feed.html">帖子流</a>
      <a href="/web/compose.html" class="nav-active">发帖</a>
      <a href="/web/mine.html">我的</a>
    </nav>

    <h1 class="page-title">发帖</h1>
    <div class="card">
      <p id="msg" class="err" role="alert"></p>
      <div class="field">
        <label for="cat">分类</label>
        <select id="cat"><option value="">（未分类）</option></select>
      </div>
      <div class="field">
        <label for="body">正文</label>
        <textarea id="body" placeholder="写点什么…"></textarea>
      </div>
      <div class="field">
        <label for="file">图片</label>
        <input type="file" id="file" accept="image/*" />
        <div class="btn-row" style="margin-top:0.5rem">
          <button type="button" class="btn btn-secondary" id="upload">上传所选图片</button>
        </div>
        <div id="thumbs"></div>
      </div>
      <div class="btn-row">
        <button type="button" class="btn btn-primary" id="pub">发布</button>
        <button type="button" class="btn btn-secondary" id="draft">保存草稿</button>
      </div>
    </div>
  </div>
  <script>
    var API = '';
    var images = [];

    function loadCats() {
      fetch(API + '/api/categories', { credentials: 'include' })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var s = document.getElementById('cat');
          (d.categories || []).forEach(function (c) {
            var o = document.createElement('option');
            o.value = String(c.id);
            o.textContent = c.name;
            s.appendChild(o);
          });
        });
    }

    document.getElementById('upload').onclick = function () {
      document.getElementById('msg').textContent = '';
      document.getElementById('msg').className = 'err';
      var f = document.getElementById('file').files[0];
      if (!f) return;
      var fd = new FormData();
      fd.append('file', f);
      fetch(API + '/api/uploads', { method: 'POST', credentials: 'include', body: fd })
        .then(function (r) {
          if (r.status === 401) throw new Error('请先登录');
          if (!r.ok) throw new Error('上传失败 ' + r.status);
          return r.json();
        })
        .then(function (d) {
          images.push(d.url);
          var img = document.createElement('img');
          img.src = d.url;
          document.getElementById('thumbs').appendChild(img);
        })
        .catch(function (e) {
          document.getElementById('msg').textContent = String(e);
        });
    };

    function submit(draft) {
      document.getElementById('msg').textContent = '';
      document.getElementById('msg').className = 'err';
      var cat = document.getElementById('cat').value;
      var payload = {
        body: document.getElementById('body').value,
        images: images,
        draft: draft
      };
      if (cat) payload.category_id = cat;
      fetch(API + '/api/posts', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(function (r) {
          if (r.status === 401) throw new Error('请先登录');
          if (!r.ok) {
            return r.text().then(function (t) {
              throw new Error(t || String(r.status));
            });
          }
          return r.json();
        })
        .then(function (p) {
          document.getElementById('msg').className = 'ok';
          document.getElementById('msg').textContent = '已保存，跳转…';
          location.href = '/web/post.html?id=' + encodeURIComponent(p.id);
        })
        .catch(function (e) {
          document.getElementById('msg').className = 'err';
          document.getElementById('msg').textContent = String(e);
        });
    }

    document.getElementById('pub').onclick = function () { submit(false); };
    document.getElementById('draft').onclick = function () { submit(true); };
    loadCats();
  </script>
</body>
</html>
