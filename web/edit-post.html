<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>编辑帖子 — Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
  <link rel="stylesheet" href="/web/assets/css/pages/compose.css" />
</head>
<body class="blink-page">
  <div class="shell shell-wide">
    <blink-nav active="mine"></blink-nav>

    <h1 class="page-title">编辑帖子</h1>
    <p id="msg" class="err" role="alert"></p>

    <div id="removed-banner" class="banner-warn" hidden>
      <strong>该帖已被管理员下架</strong>
      <p class="field-hint" style="margin:0.35rem 0 0">原因</p>
      <pre id="mod-reason" style="margin:0;white-space:pre-wrap;font-family:inherit;font-size:0.9rem"></pre>
      <p id="appeal-pending" class="ok" style="margin:0.75rem 0 0" hidden>你的申诉或复核申请正在等待管理员处理。</p>
      <div id="appeal-actions" hidden>
        <div class="field" style="margin-bottom:0.75rem">
          <label for="appeal-msg">申诉说明（选填；提交「申诉」时必填）</label>
          <textarea id="appeal-msg" rows="3" placeholder="若仅申请复核，可留空或简要说明修改点。"></textarea>
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn-primary" id="btn-appeal">提交申诉</button>
          <button type="button" class="btn btn-secondary" id="btn-resubmit">修改后申请复核</button>
        </div>
      </div>
    </div>

    <div id="flagged-banner" class="banner-warn" hidden>
      <strong>该帖已被标记为违规，公开流中暂不展示</strong>
      <p class="field-hint" style="margin:0.35rem 0 0">说明</p>
      <pre id="flagged-mod-reason" style="margin:0;white-space:pre-wrap;font-family:inherit;font-size:0.9rem"></pre>
      <p id="flagged-appeal-pending" class="ok" style="margin:0.75rem 0 0" hidden>你的恢复申请正在等待管理员处理。</p>
      <div id="flagged-appeal-actions" hidden>
        <div class="field" style="margin-bottom:0.75rem">
          <label for="flagged-restore-msg">申请恢复理由（必填）</label>
          <textarea id="flagged-restore-msg" rows="3" placeholder="请说明修改内容或申诉理由，供管理员审核。"></textarea>
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn-primary" id="btn-flagged-restore">提交恢复申请</button>
        </div>
      </div>
    </div>

    <div class="card" id="form-card" hidden>
      <div id="editor-mount"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="/web/assets/js/md.js"></script>
  <script src="/web/assets/js/api.js"></script>
  <script src="/web/assets/js/ui.js"></script>
  <script src="/web/assets/js/nav.js"></script>
  <script src="/web/assets/js/post-editor.js"></script>
  <script src="/web/assets/js/pages/edit-post.js"></script>
</body>
</html>
