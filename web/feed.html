<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>帖子流 — Blink</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 1rem auto; padding: 0 1rem; }
    .tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .tabs a, .tabs button { padding: 0.35rem 0.75rem; border-radius: 6px; border: 1px solid #ccc; background: #f8f8f8; cursor: pointer; text-decoration: none; color: inherit; font-size: 0.9rem; }
    .tabs a.active, .tabs button.active { background: #0b57d0; color: #fff; border-color: #0b57d0; }
    article { border-bottom: 1px solid #eee; padding: 0.75rem 0; }
    article h2 { font-size: 1rem; margin: 0 0 0.35rem; }
    article a { color: #0b57d0; text-decoration: none; }
    .meta { font-size: 0.8rem; color: #666; }
    nav { margin-bottom: 1rem; }
    nav a { margin-right: 1rem; }
    .err { color: #b00020; }
  </style>
</head>
<body>
  <nav>
    <a href="/web/index.html">首页</a>
    <a href="/web/compose.html">发帖</a>
    <a href="/web/admin.html">管理</a>
  </nav>
  <h1>帖子流</h1>
  <p id="err" class="err"></p>
  <div class="tabs" id="cats"></div>
  <div id="list"></div>
  <p><button type="button" id="more" hidden>加载更多</button></p>
  <script>
    var API = '';
    var cursor = null;
    var categoryId = null;
    var uncategorized = false;

    function el(tag, text) {
      var e = document.createElement(tag);
      if (text) e.textContent = text;
      return e;
    }

    function loadCategories() {
      fetch(API + '/api/categories', { credentials: 'include' })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var wrap = document.getElementById('cats');
          wrap.innerHTML = '';
          var all = el('button', '全部');
          all.className = categoryId === null && !uncategorized ? 'active' : '';
          all.onclick = function () {
            categoryId = null;
            uncategorized = false;
            resetList();
            loadPosts(true);
            loadCategories();
          };
          wrap.appendChild(all);
          var uncat = el('button', '未分类');
          uncat.className = uncategorized ? 'active' : '';
          uncat.onclick = function () {
            categoryId = null;
            uncategorized = true;
            resetList();
            loadPosts(true);
            loadCategories();
          };
          wrap.appendChild(uncat);
          (d.categories || []).forEach(function (c) {
            var b = el('button', c.name);
            b.className = String(categoryId) === String(c.id) ? 'active' : '';
            b.onclick = function () {
              categoryId = String(c.id);
              uncategorized = false;
              resetList();
              loadPosts(true);
              loadCategories();
            };
            wrap.appendChild(b);
          });
        })
        .catch(function (e) {
          document.getElementById('err').textContent = String(e);
        });
    }

    function resetList() {
      cursor = null;
      document.getElementById('list').innerHTML = '';
      document.getElementById('more').hidden = true;
    }

    function loadPosts(reset) {
      document.getElementById('err').textContent = '';
      var q = 'limit=15';
      if (categoryId != null) q += '&category_id=' + encodeURIComponent(categoryId);
      if (uncategorized) q += '&uncategorized=1';
      if (cursor != null && !reset) q += '&cursor=' + encodeURIComponent(cursor);
      if (reset) cursor = null;
      fetch(API + '/api/posts?' + q, { credentials: 'include' })
        .then(function (r) {
          if (!r.ok) throw new Error('加载失败 ' + r.status);
          return r.json();
        })
        .then(function (d) {
          var list = document.getElementById('list');
          (d.posts || []).forEach(function (p) {
            var art = document.createElement('article');
            var h = el('h2');
            var link = el('a', (p.body || '').slice(0, 80) + ((p.body || '').length > 80 ? '…' : ''));
            link.href = '/web/post.html?id=' + encodeURIComponent(p.id);
            h.appendChild(link);
            art.appendChild(h);
            var meta = el('div', '帖子 #' + p.id + ' · 用户 ' + p.user_id);
            meta.className = 'meta';
            art.appendChild(meta);
            list.appendChild(art);
          });
          cursor = d.next_cursor;
          document.getElementById('more').hidden = !cursor || (d.posts || []).length === 0;
        })
        .catch(function (e) {
          document.getElementById('err').textContent = String(e);
        });
    }

    document.getElementById('more').onclick = function () {
      loadPosts(false);
    };

    loadCategories();
    loadPosts(true);
  </script>
</body>
</html>
