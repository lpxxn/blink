<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
</head>
<body class="blink-page">
  <div class="shell shell-wide">
    <blink-nav active="home"></blink-nav>

    <h1 class="page-title">轻量帖子与评论</h1>
    <p class="page-lead">演示站点：浏览动态、发帖与评论。部分操作需先登录。</p>

    <div class="card">
      <h2 class="section-title" style="margin-top:0">逛逛</h2>
      <ul class="home-actions">
        <li><a href="/web/feed.html">帖子流</a> — 按分类浏览</li>
        <li><a href="/web/compose.html">发帖</a> — 图文与草稿</li>
        <li><a href="/web/mine.html">我的</a> — 个人设置、帖子与草稿</li>
        <li data-blink-nav="admin" hidden><a href="/web/admin.html">管理后台</a> — 需 super_admin</li>
      </ul>
    </div>

    <div class="card" style="margin-top:1rem">
      <h2 class="section-title" style="margin-top:0">登录</h2>
      <p class="page-lead" style="margin-bottom:0.75rem">使用已配置的 OAuth（需环境变量与回调 URL 正确）。邮箱注册用户请选「内置账号」。</p>
      <ul class="oauth-list">
        <li><button type="button" class="btn btn-primary" data-login="builtin">内置账号（builtin）</button></li>
        <li><button type="button" class="btn btn-secondary" data-login="google">Google</button></li>
      </ul>
      <p class="field-hint" style="margin-top:1rem;margin-bottom:0">
        还没有账号？<a href="/web/register.html" style="color:var(--accent);font-weight:600;text-decoration:none">注册邮箱密码</a> 后，可用内置账号登录。
      </p>
    </div>
  </div>

  <script src="/web/assets/js/api.js"></script>
  <script src="/web/assets/js/nav.js"></script>
  <script>
    (function () {
      var next = encodeURIComponent('/web/feed.html');
      document.querySelectorAll('[data-login]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          window.location.href = '/auth/oauth/' + btn.dataset.login + '/login?next=' + next;
        });
      });
    })();
  </script>
</body>
</html>
