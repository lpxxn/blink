<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>消息 — Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
</head>
<body class="blink-page">
  <div class="shell shell-wide">
    <blink-nav active="messages"></blink-nav>

    <h1 class="page-title">站内消息</h1>
    <p class="page-lead">评论、下架与申诉结果等会出现在这里。</p>
    <p id="err" class="err" role="alert"></p>

    <div class="card" style="padding:0.75rem 1.25rem 1rem">
      <div class="btn-row" style="margin-bottom:0.75rem">
        <button type="button" class="btn btn-secondary btn-sm" id="mark-all">全部标为已读</button>
        <span id="unread-hint" class="field-hint" style="margin:0;align-self:center"></span>
      </div>
      <div id="list"></div>
      <p style="margin-top:0.75rem;margin-bottom:0">
        <button type="button" class="btn btn-secondary" id="more" hidden>加载更多</button>
      </p>
    </div>
  </div>

  <script src="/web/assets/js/api.js"></script>
  <script src="/web/assets/js/ui.js"></script>
  <script src="/web/assets/js/nav.js"></script>
  <script src="/web/assets/js/pages/messages.js"></script>
</body>
</html>
