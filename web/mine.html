<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的 — Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
</head>
<body class="blink-page">
  <div class="shell shell-wide">
    <nav class="top-nav">
      <a class="brand" href="/web/index.html">Blink</a>
      <a href="/web/index.html">首页</a>
      <a href="/web/register.html">注册</a>
      <a href="/web/feed.html">帖子流</a>
      <a href="/web/compose.html">发帖</a>
      <a href="/web/mine.html" class="nav-active">我的</a>
      <a href="/web/messages.html">消息</a>
      <a href="/web/admin.html" data-blink-nav="admin" hidden>管理</a>
    </nav>

    <h1 class="page-title">我的</h1>
    <p class="page-lead">管理账号与帖子列表。草稿可点「发布」直接公开，或进编辑页改状态。</p>
    <p id="err" class="err" role="alert"></p>

    <div class="card" id="profile-card">
      <h2 class="section-title" style="margin-top:0">个人设置</h2>
      <div id="profile-guest" hidden>
        <p class="page-lead" style="margin:0 0 0.75rem">你尚未登录。</p>
        <a class="btn btn-primary" href="/web/index.html">去首页登录</a>
        <a class="btn btn-secondary" href="/web/register.html" style="margin-left:0.35rem">注册</a>
      </div>
      <div id="profile-user" hidden>
        <p class="field-hint" style="margin-top:0">用户 ID：<span id="me-id">—</span></p>
        <p class="field-hint">邮箱：<span id="me-email">—</span></p>
        <p class="field-hint">角色：<span id="me-role">—</span></p>
        <div class="field" style="margin-bottom:0.75rem">
          <label for="me-name">显示昵称</label>
          <input type="text" id="me-name" maxlength="80" autocomplete="nickname" />
          <p class="field-hint" style="margin-bottom:0">最多 80 字，会显示在帖子与评论旁。</p>
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn-primary" id="save-name">保存昵称</button>
          <button type="button" class="btn btn-secondary" id="logout">退出登录</button>
        </div>
        <p id="profile-msg" class="err" role="status" style="margin-top:0.75rem;margin-bottom:0;min-height:0"></p>
      </div>
    </div>

    <h2 class="section-title">我的帖子</h2>
    <div class="card" style="padding:0.5rem 1.25rem 1rem">
      <div id="list"></div>
      <p style="margin-top:0.75rem;margin-bottom:0">
        <button type="button" class="btn btn-secondary" id="more" hidden>加载更多</button>
      </p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="/web/assets/js/md.js"></script>
  <script>
    var API = '';
    var cursor = null;
    var me = null;

    function sid(v) {
      return v != null ? String(v) : '';
    }

    function statusLabel(s) {
      if (s === 0) return '草稿';
      if (s === 1) return '已发布';
      if (s === 2) return '已隐藏';
      return '状态 ' + s;
    }

    function showProfileMsg(t, ok) {
      var el = document.getElementById('profile-msg');
      el.textContent = t || '';
      el.className = ok ? 'ok' : 'err';
    }

    function applyMe(d) {
      me = d;
      document.getElementById('me-id').textContent = d.user_id != null ? String(d.user_id) : '—';
      document.getElementById('me-email').textContent = d.email || '—';
      document.getElementById('me-role').textContent = d.role || '—';
      document.getElementById('me-name').value = d.name || '';
      document.getElementById('profile-guest').hidden = true;
      document.getElementById('profile-user').hidden = false;
    }

    function loadProfile() {
      showProfileMsg('', true);
      fetch(API + '/api/me', { credentials: 'include' })
        .then(function (r) {
          if (r.status === 401) {
            me = null;
            document.getElementById('profile-guest').hidden = false;
            document.getElementById('profile-user').hidden = true;
            document.getElementById('list').innerHTML = '<p class="field-hint" style="margin:0.5rem 0">登录后可在此查看与管理帖子。</p>';
            document.getElementById('more').hidden = true;
            return null;
          }
          if (!r.ok) throw new Error('加载资料失败 ' + r.status);
          return r.json();
        })
        .then(function (d) {
          if (d) {
            applyMe(d);
            loadPage(true);
          }
        })
        .catch(function (e) {
          showProfileMsg(String(e), false);
        });
    }

    document.getElementById('save-name').onclick = function () {
      showProfileMsg('', true);
      var name = document.getElementById('me-name').value.trim();
      if (!name) {
        showProfileMsg('昵称不能为空', false);
        return;
      }
      fetch(API + '/api/me', {
        method: 'PATCH',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name })
      })
        .then(function (r) {
          if (r.status === 401) {
            loadProfile();
            throw new Error('请先登录');
          }
          if (!r.ok) return r.text().then(function (t) { throw new Error(t || String(r.status)); });
          return r.json();
        })
        .then(function (d) {
          if (d) applyMe(d);
          showProfileMsg('已保存', true);
        })
        .catch(function (e) {
          showProfileMsg(String(e), false);
        });
    };

    document.getElementById('logout').onclick = function () {
      fetch(API + '/api/logout', { method: 'POST', credentials: 'include' })
        .then(function () {
          window.location.href = '/web/index.html';
        })
        .catch(function () {
          window.location.href = '/web/index.html';
        });
    };

    function loadPage(reset) {
      document.getElementById('err').textContent = '';
      var q = 'include_draft=1&limit=15';
      if (cursor != null && !reset) q += '&cursor=' + encodeURIComponent(cursor);
      if (reset) cursor = null;
      fetch(API + '/api/me/posts?' + q, { credentials: 'include' })
        .then(function (r) {
          if (r.status === 401) throw new Error('请先登录');
          if (!r.ok) throw new Error('加载失败 ' + r.status);
          return r.json();
        })
        .then(function (d) {
          var list = document.getElementById('list');
          if (reset) list.innerHTML = '';
          (d.posts || []).forEach(function (p) {
            var row = document.createElement('div');
            row.className = 'mine-row';
            var h = document.createElement('p');
            h.className = 'mine-snippet';
            var viewA = document.createElement('a');
            viewA.href = '/web/post.html?id=' + encodeURIComponent(sid(p.id));
            viewA.textContent = BlinkMD.plainSnippet(p.body, 100);
            h.appendChild(viewA);
            row.appendChild(h);
            var meta = document.createElement('div');
            meta.className = 'meta';
            meta.textContent = '#' + sid(p.id) + ' · ' + statusLabel(p.status);
            row.appendChild(meta);
            var act = document.createElement('div');
            act.className = 'mine-actions';
            if (p.status === 0) {
              var pubB = document.createElement('button');
              pubB.type = 'button';
              pubB.className = 'btn btn-primary btn-sm';
              pubB.textContent = '发布';
              pubB.onclick = function () {
                fetch(API + '/api/posts/' + encodeURIComponent(sid(p.id)), {
                  method: 'PATCH',
                  credentials: 'include',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ status: 1 })
                })
                  .then(function (r) {
                    if (r.status === 401) throw new Error('请先登录');
                    if (!r.ok) throw new Error('发布失败 ' + r.status);
                    meta.textContent = '#' + sid(p.id) + ' · ' + statusLabel(1);
                    pubB.remove();
                  })
                  .catch(function (e) {
                    document.getElementById('err').textContent = String(e);
                  });
              };
              act.appendChild(pubB);
            }
            var editB = document.createElement('a');
            editB.className = 'btn btn-secondary btn-sm';
            editB.href = '/web/edit-post.html?id=' + encodeURIComponent(sid(p.id));
            editB.textContent = '编辑';
            act.appendChild(editB);
            var delB = document.createElement('button');
            delB.type = 'button';
            delB.className = 'btn btn-secondary btn-sm';
            delB.textContent = '删除';
            delB.onclick = function () {
              if (!confirm('确定删除该帖子？不可恢复。')) return;
              fetch(API + '/api/posts/' + encodeURIComponent(sid(p.id)), {
                method: 'DELETE',
                credentials: 'include'
              })
                .then(function (r) {
                  if (r.status === 401) throw new Error('请先登录');
                  if (r.status === 404) throw new Error('帖子不存在');
                  if (!r.ok) throw new Error('删除失败 ' + r.status);
                  row.remove();
                })
                .catch(function (e) {
                  document.getElementById('err').textContent = String(e);
                });
            };
            act.appendChild(delB);
            row.appendChild(act);
            list.appendChild(row);
          });
          cursor = d.next_cursor;
          document.getElementById('more').hidden = !cursor || (d.posts || []).length === 0;
        })
        .catch(function (e) {
          document.getElementById('err').textContent = String(e);
        });
    }

    document.getElementById('more').onclick = function () {
      loadPage(false);
    };

    loadProfile();
  </script>
  <script src="/web/nav.js"></script>
</body>
</html>
