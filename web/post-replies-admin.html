<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>帖子评论管理（含隐藏） — Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
</head>
<body class="blink-page">
  <div class="shell shell-wide">
    <nav class="top-nav">
      <a class="brand" href="/web/index.html">Blink</a>
      <a href="/web/index.html">首页</a>
      <a href="/web/register.html">注册</a>
      <a href="/web/feed.html">帖子流</a>
      <a href="/web/compose.html">发帖</a>
      <a href="/web/mine.html">我的</a>
      <a href="/web/messages.html">消息</a>
      <a href="/web/admin.html" data-blink-nav="admin" hidden>管理</a>
    </nav>

    <div id="gate">
      <h1 class="page-title">帖子评论管理（含隐藏）</h1>
      <div class="card" style="margin-top:0.75rem">
        <p class="page-lead" id="gate-lead" style="margin-top:0">正在验证权限…</p>
        <p style="margin:1rem 0 0">
          <a class="btn btn-primary" href="/web/index.html">去首页登录</a>
          <a class="btn btn-secondary" href="/web/admin.html" style="margin-left:0.35rem">返回管理后台</a>
        </p>
      </div>
    </div>

    <div id="app" hidden>
      <h1 class="page-title">帖子评论管理（含隐藏）</h1>
      <p class="page-lead" style="margin-top:0">仅 super_admin 可见；可按帖子加载评论并隐藏/恢复（级联），也可直接按 reply_id 级联隐藏。</p>
      <p id="err" class="err" role="alert"></p>

      <div class="card" style="margin-top:0.75rem">
        <h2 class="section-title" style="margin-top:0">查询</h2>
        <div class="field" style="margin-bottom:0.75rem">
          <label for="post-id">post_id</label>
          <input id="post-id" placeholder="例如：1234567890" />
        </div>
        <div class="btn-row" style="flex-wrap:wrap; gap:0.5rem">
          <button type="button" class="btn btn-primary" id="load">加载</button>
          <button type="button" class="btn btn-secondary btn-sm" id="more" disabled>加载更多</button>
          <button type="button" class="btn btn-secondary btn-sm" id="refresh" disabled>刷新</button>
        </div>
      </div>

      <div class="card" style="margin-top:0.75rem">
        <h2 class="section-title" style="margin-top:0">按 reply_id 隐藏</h2>
        <p class="page-lead" style="margin-top:0">输入评论 ID 后将该评论及其所有子评论设为隐藏（级联）。无需先加载帖子列表。</p>
        <div class="field" style="margin-bottom:0.75rem">
          <label for="hide-reply-id">reply_id</label>
          <input id="hide-reply-id" placeholder="例如：1234567890" />
        </div>
        <button type="button" class="btn btn-secondary btn-sm" id="hide-reply-btn">隐藏评论（级联）</button>
      </div>

      <h2 class="section-title">评论列表</h2>
      <p id="page-meta" class="page-lead" style="margin-top:0"></p>
      <div class="data-table-wrap">
        <table class="data-table" id="tbl">
          <thead>
            <tr>
              <th>ID</th>
              <th>用户</th>
              <th>用户ID</th>
              <th>父评论ID</th>
              <th>状态</th>
              <th>内容</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    var API = '';
    var currentPostID = '';
    var nextCursor = null;
    var pageSize = 50;

    function sid(v) { return v != null ? String(v) : ''; }

    function setGate(msg) {
      document.getElementById('gate-lead').textContent = msg;
      document.getElementById('gate').hidden = false;
      document.getElementById('app').hidden = true;
    }

    function setAuthed() {
      document.getElementById('gate').hidden = true;
      document.getElementById('app').hidden = false;
    }

    function ensureAdminJson(r, label) {
      if (r.status === 403) return Promise.reject(new Error('需要 super_admin 登录'));
      if (r.status === 401) return Promise.reject(new Error('请先登录'));
      if (!r.ok) {
        return r.text().then(function (t) {
          throw new Error(label + ' ' + r.status + (t ? ': ' + t : ''));
        });
      }
      return r.json();
    }

    function loadMe() {
      return fetch(API + '/api/me', { credentials: 'include' })
        .then(function (r) {
          if (r.status === 401) return null;
          if (!r.ok) return null;
          return r.json();
        })
        .then(function (me) {
          if (!me || !me.user_id) return null;
          return me;
        })
        .catch(function () { return null; });
    }

    function statusLabel(s) {
      if (s === 0) return '可见';
      if (s === 1) return '隐藏';
      return sid(s);
    }

    function bodySummary(b) {
      b = b == null ? '' : String(b);
      b = b.replace(/\s+/g, ' ').trim();
      if (b.length <= 80) return b;
      return b.slice(0, 80) + '…';
    }

    function patchReplyHidden(replyId, hidden) {
      return fetch(API + '/admin/api/replies/' + encodeURIComponent(sid(replyId)), {
        method: 'PATCH',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hidden: !!hidden })
      }).then(function (r) {
        if (r.status === 403) throw new Error('需要 super_admin');
        if (r.status === 401) throw new Error('请先登录');
        if (r.status === 204) return;
        return r.text().then(function (t) { throw new Error(t || String(r.status)); });
      });
    }

    function fetchReplies(postId, cursor) {
      var url = API + '/admin/api/posts/' + encodeURIComponent(sid(postId)) + '/replies?limit=' + encodeURIComponent(String(pageSize));
      if (cursor) url += '&cursor=' + encodeURIComponent(String(cursor));
      return fetch(url, { credentials: 'include' }).then(function (r) {
        return ensureAdminJson(r, '加载评论失败');
      });
    }

    function clearTable() {
      document.querySelector('#tbl tbody').innerHTML = '';
    }

    function appendBtn(row, label, className, onClick) {
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'btn ' + className + ' btn-sm';
      b.textContent = label;
      b.onclick = onClick;
      row.appendChild(b);
    }

    function renderAppend(list) {
      var tb = document.querySelector('#tbl tbody');
      (list || []).forEach(function (r) {
        var tr = document.createElement('tr');
        var cells = [
          sid(r.id),
          r.user_name || '—',
          sid(r.user_id),
          r.parent_reply_id != null ? sid(r.parent_reply_id) : '—',
          statusLabel(r.status),
          bodySummary(r.body || '')
        ];
        cells.forEach(function (v) {
          var td = document.createElement('td');
          td.textContent = v;
          tr.appendChild(td);
        });
        var act = document.createElement('td');
        var row = document.createElement('div');
        row.style.display = 'flex';
        row.style.flexWrap = 'wrap';
        row.style.gap = '0.35rem';

        if (r.status === 1) {
          appendBtn(row, '恢复显示（级联）', 'btn-secondary', function () {
            if (!window.confirm('恢复该评论及其所有子评论为可见？')) return;
            patchReplyHidden(r.id, false).then(function () { loadFirstPage(); }).catch(showErr);
          });
        } else {
          appendBtn(row, '隐藏（级联）', 'btn-secondary', function () {
            if (!window.confirm('隐藏该评论及其所有子评论？')) return;
            patchReplyHidden(r.id, true).then(function () { loadFirstPage(); }).catch(showErr);
          });
        }
        act.appendChild(row);
        tr.appendChild(act);
        tb.appendChild(tr);
      });
    }

    function setMeta(loaded, hasMore) {
      var m = '已加载 ' + String(loaded) + ' 条';
      if (hasMore) m += '（可继续加载更多）';
      document.getElementById('page-meta').textContent = m;
    }

    function showErr(e) {
      document.getElementById('err').textContent = String(e && e.message ? e.message : e);
    }

    function loadFirstPage() {
      document.getElementById('err').textContent = '';
      var postId = String(document.getElementById('post-id').value || '').trim();
      if (!postId) return showErr(new Error('请填写 post_id'));
      currentPostID = postId;
      nextCursor = null;
      clearTable();
      document.getElementById('more').disabled = true;
      document.getElementById('refresh').disabled = false;
      return fetchReplies(currentPostID, null).then(function (d) {
        var list = d.replies || [];
        renderAppend(list);
        nextCursor = d.next_cursor || null;
        document.getElementById('more').disabled = !nextCursor;
        setMeta(list.length, !!nextCursor);
      }).catch(showErr);
    }

    function loadMore() {
      if (!currentPostID || !nextCursor) return;
      document.getElementById('err').textContent = '';
      var cursor = nextCursor;
      return fetchReplies(currentPostID, cursor).then(function (d) {
        var list = d.replies || [];
        renderAppend(list);
        nextCursor = d.next_cursor || null;
        document.getElementById('more').disabled = !nextCursor;
        var loaded = document.querySelectorAll('#tbl tbody tr').length;
        setMeta(loaded, !!nextCursor);
      }).catch(showErr);
    }

    function init() {
      setGate('正在验证权限…');
      loadMe().then(function (me) {
        if (!me) return setGate('请先登录后再访问');
        if (me.role !== 'super_admin') return setGate('需要 super_admin 权限');
        setAuthed();
        var nav = document.querySelector('[data-blink-nav="admin"]');
        if (nav) nav.hidden = false;
      });

      document.getElementById('load').onclick = loadFirstPage;
      document.getElementById('more').onclick = loadMore;
      document.getElementById('refresh').onclick = loadFirstPage;

      document.getElementById('hide-reply-btn').onclick = function () {
        document.getElementById('err').textContent = '';
        var rid = String(document.getElementById('hide-reply-id').value || '').trim();
        if (!rid) return showErr(new Error('请填写 reply_id'));
        if (!window.confirm('隐藏评论 #' + rid + '（含所有子评论）？')) return;
        patchReplyHidden(rid, true)
          .then(function () {
            document.getElementById('hide-reply-id').value = '';
            if (currentPostID) return loadFirstPage();
          })
          .catch(showErr);
      };
    }

    init();
  </script>
</body>
</html>
