<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>帖子 — Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
</head>
<body class="blink-page">
  <div class="shell shell-wide">
    <nav class="top-nav">
      <a class="brand" href="/web/index.html">Blink</a>
      <a href="/web/index.html">首页</a>
      <a href="/web/register.html">注册</a>
      <a href="/web/feed.html">帖子流</a>
      <a href="/web/compose.html">发帖</a>
      <a href="/web/mine.html">我的</a>
      <a href="/web/messages.html">消息</a>
      <a href="/web/admin.html" data-blink-nav="admin" hidden>管理</a>
    </nav>

    <h1 class="page-title">帖子</h1>
    <p id="err" class="err" role="alert"></p>

    <div class="card" id="post"></div>

    <h2 class="section-title">评论</h2>
    <div class="card" style="padding-bottom:0.75rem">
      <div id="replies"></div>
    </div>

    <h3 class="section-title" style="font-size:1rem">写评论</h3>
    <div class="card">
      <p id="reply-hint" class="reply-target-hint" hidden></p>
      <p style="margin:0 0 0.5rem">
        <button type="button" class="btn btn-ghost btn-sm" id="cancel-reply" hidden>取消回复</button>
      </p>
      <div class="field" style="margin-bottom:0.75rem">
        <textarea id="rbody" placeholder="内容"></textarea>
      </div>
      <button type="button" class="btn btn-primary" id="send">发送</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="/web/md.js"></script>
  <script>
    var API = '';
    var params = new URLSearchParams(location.search);
    var id = params.get('id');
    var myUserId = null;
    var myRole = null;
    var parentReplyId = null;

    if (!id) {
      document.getElementById('err').textContent = '缺少 id';
    }

    function sid(v) {
      return v != null ? String(v) : '';
    }

    function authorLabel(obj) {
      var n = obj && obj.user_name != null ? String(obj.user_name).trim() : '';
      if (n) return n;
      return '用户 ' + sid(obj.user_id);
    }

    function loadMe() {
      return fetch(API + '/api/me', { credentials: 'include' })
        .then(function (r) {
          if (!r.ok) return null;
          return r.json();
        })
        .then(function (d) {
          if (d && d.user_id != null) myUserId = sid(d.user_id);
          if (d && d.role != null) myRole = String(d.role);
        })
        .catch(function () {
          myUserId = null;
          myRole = null;
        });
    }

    function isSuperAdmin() {
      return myRole === 'super_admin';
    }

    function showPost(p) {
      var root = document.getElementById('post');
      root.innerHTML = '';
      var mf = p.moderation_flag != null ? Number(p.moderation_flag) : 0;
      if (mf === 1 || mf === 2) {
        var ban = document.createElement('div');
        ban.className = 'banner-warn';
        ban.style.marginBottom = '0.75rem';
        var title = document.createElement('strong');
        title.textContent = mf === 2 ? '该帖已被管理员下架' : '该帖已被标记为违规，公开流中暂不展示';
        ban.appendChild(title);
        var lbl = document.createElement('p');
        lbl.className = 'field-hint';
        lbl.style.margin = '0.35rem 0 0';
        lbl.textContent = mf === 2 ? '原因' : '说明';
        ban.appendChild(lbl);
        var pre = document.createElement('pre');
        pre.style.margin = '0';
        pre.style.whiteSpace = 'pre-wrap';
        pre.style.fontFamily = 'inherit';
        pre.style.fontSize = '0.9rem';
        var noteRaw = (p.moderation_note && String(p.moderation_note).trim()) ? String(p.moderation_note).trim() : '';
        pre.textContent = noteRaw ? BlinkMD.formatModerationNote(noteRaw) : '（未填写）';
        ban.appendChild(pre);
        if (Number(p.appeal_status) === 1) {
          var pend = document.createElement('p');
          pend.className = 'ok';
          pend.style.margin = '0.75rem 0 0';
          pend.textContent = mf === 2
            ? '你的申诉或复核申请正在等待管理员处理。'
            : '你的恢复申请正在等待管理员处理。';
          ban.appendChild(pend);
        }
        if (myUserId && sid(p.user_id) === myUserId) {
          var hint = document.createElement('p');
          hint.className = 'field-hint';
          hint.style.marginTop = '0.5rem';
          hint.appendChild(document.createTextNode('如需修改内容或提交申请，请前往 '));
          var edL = document.createElement('a');
          edL.href = '/web/edit-post.html?id=' + encodeURIComponent(sid(p.id));
          edL.textContent = '编辑页';
          hint.appendChild(edL);
          hint.appendChild(document.createTextNode('。'));
          ban.appendChild(hint);
        }
        if (isSuperAdmin()) {
          var adminRow = document.createElement('div');
          adminRow.className = 'btn-row';
          adminRow.style.marginTop = '0.75rem';
          var admBtn = document.createElement('button');
          admBtn.type = 'button';
          admBtn.className = 'btn btn-primary btn-sm';
          admBtn.textContent = mf === 2 ? '管理员：恢复上架' : '管理员：解除违规';
          admBtn.onclick = function () {
            adminRestorePost(sid(p.id), mf);
          };
          adminRow.appendChild(admBtn);
          ban.appendChild(adminRow);
        }
        root.appendChild(ban);
      }
      var meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = '#' + sid(p.id) + ' · ' + authorLabel(p) + ' · 状态 ' + sid(p.status);
      root.appendChild(meta);
      var b = document.createElement('div');
      b.className = 'markdown-body';
      b.innerHTML = BlinkMD.parse(p.body || '');
      root.appendChild(b);
      if (p.images && p.images.length) {
        var im = document.createElement('div');
        im.className = 'imgs';
        p.images.forEach(function (u) {
          var img = document.createElement('img');
          img.src = u;
          img.alt = '';
          im.appendChild(img);
        });
        root.appendChild(im);
      }
      if (myUserId && sid(p.user_id) === myUserId) {
        var act = document.createElement('div');
        act.className = 'post-author-actions';
        var ed = document.createElement('a');
        ed.className = 'btn btn-secondary btn-sm';
        ed.href = '/web/edit-post.html?id=' + encodeURIComponent(sid(p.id));
        ed.textContent = '编辑此帖';
        act.appendChild(ed);
        root.appendChild(act);
      }
    }

    function replyDepth(x, byId) {
      var d = 0;
      var pid = x.parent_reply_id;
      var guard = {};
      while (pid != null && pid !== '' && byId[sid(pid)]) {
        if (guard[sid(pid)]) break;
        guard[sid(pid)] = 1;
        d++;
        pid = byId[sid(pid)].parent_reply_id;
        if (d > 40) break;
      }
      return d;
    }

    function adminRestorePost(postId, mf) {
      var msg = mf === 2
        ? '确定恢复该帖上架？将清除下架标记、清空备注，并把状态设为「已发布」。'
        : '确定解除违规标记？将清空备注；不改变帖子发布/草稿状态。';
      if (!window.confirm(msg)) return;
      document.getElementById('err').textContent = '';
      var body = { moderation_flag: 0, moderation_note: '' };
      if (mf === 2) {
        body.status = 1;
      }
      fetch(API + '/admin/api/posts/' + encodeURIComponent(postId), {
        method: 'PATCH',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
        .then(function (r) {
          if (r.status === 401) throw new Error('请先登录');
          if (r.status === 403) throw new Error('需要 super_admin');
          if (!r.ok) {
            return r.text().then(function (t) {
              throw new Error(t || String(r.status));
            });
          }
          return r.json();
        })
        .then(function () {
          loadPost();
        })
        .catch(function (e) {
          document.getElementById('err').textContent = String(e);
        });
    }

    function loadPost() {
      fetch(API + '/api/posts/' + encodeURIComponent(id), { credentials: 'include' })
        .then(function (r) {
          if (r.status === 404) throw new Error('帖子不存在或无权查看');
          if (!r.ok) throw new Error('加载失败 ' + r.status);
          return r.json();
        })
        .then(showPost)
        .catch(function (e) {
          document.getElementById('err').textContent = String(e);
        });
    }

    function clearReplyTarget() {
      parentReplyId = null;
      document.getElementById('reply-hint').hidden = true;
      document.getElementById('reply-hint').innerHTML = '';
      document.getElementById('cancel-reply').hidden = true;
    }

    document.getElementById('cancel-reply').onclick = clearReplyTarget;

    function loadReplies() {
      fetch(API + '/api/posts/' + encodeURIComponent(id) + '/replies?limit=100', { credentials: 'include' })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var list = d.replies || [];
          var byId = {};
          list.forEach(function (x) {
            byId[sid(x.id)] = x;
          });
          var box = document.getElementById('replies');
          box.innerHTML = '';
          list.forEach(function (x) {
            var depth = replyDepth(x, byId);
            var r = document.createElement('div');
            r.className = 'reply' + (depth > 0 ? ' reply-nested' : '');
            r.style.marginLeft = (depth * 14) + 'px';
            r.appendChild(document.createTextNode(x.body));
            var m = document.createElement('div');
            m.className = 'meta';
            var line = authorLabel(x) + ' · #' + sid(x.id);
            if (x.parent_reply_id != null && x.parent_reply_id !== '') {
              var par = byId[sid(x.parent_reply_id)];
              line = '↪ 回复 ' + (par ? authorLabel(par) : '#' + sid(x.parent_reply_id)) + ' · ' + line;
            }
            m.textContent = line;
            r.appendChild(m);
            var actions = document.createElement('div');
            actions.className = 'reply-actions';
            var rb = document.createElement('button');
            rb.type = 'button';
            rb.className = 'btn btn-secondary btn-sm';
            rb.textContent = '回复';
            rb.onclick = function () {
              parentReplyId = sid(x.id);
              document.getElementById('reply-hint').innerHTML =
                '正在回复 <strong>#' + parentReplyId + '</strong>（' + authorLabel(x) + '）';
              document.getElementById('reply-hint').hidden = false;
              document.getElementById('cancel-reply').hidden = false;
              document.getElementById('rbody').focus();
            };
            actions.appendChild(rb);
            if (isSuperAdmin()) {
              var hb = document.createElement('button');
              hb.type = 'button';
              hb.className = 'btn btn-secondary btn-sm';
              hb.textContent = '隐藏';
              hb.onclick = function () {
                if (!window.confirm('隐藏评论 #' + sid(x.id) + '（含所有子评论）？')) return;
                fetch(API + '/admin/api/replies/' + encodeURIComponent(sid(x.id)), {
                  method: 'PATCH',
                  credentials: 'include',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ hidden: true })
                })
                  .then(function (res) {
                    if (res.status === 401) throw new Error('请先登录');
                    if (res.status === 403) throw new Error('需要 super_admin');
                    if (res.status === 204) return;
                    if (!res.ok) throw new Error('隐藏失败 ' + res.status);
                  })
                  .then(function () {
                    loadReplies();
                  })
                  .catch(function (e) {
                    document.getElementById('err').textContent = String(e);
                  });
              };
              actions.appendChild(hb);
            }
            if (myUserId && sid(x.user_id) === myUserId) {
              var db = document.createElement('button');
              db.type = 'button';
              db.className = 'btn btn-secondary btn-sm';
              db.textContent = '删除';
              db.onclick = function () {
                if (!confirm('删除这条评论？')) return;
                fetch(API + '/api/replies/' + encodeURIComponent(sid(x.id)), {
                  method: 'DELETE',
                  credentials: 'include'
                })
                  .then(function (res) {
                    if (res.status === 401) throw new Error('请先登录');
                    if (!res.ok) throw new Error('删除失败 ' + res.status);
                    loadReplies();
                  })
                  .catch(function (e) {
                    document.getElementById('err').textContent = String(e);
                  });
              };
              actions.appendChild(db);
            }
            r.appendChild(actions);
            box.appendChild(r);
          });
        });
    }

    document.getElementById('send').onclick = function () {
      document.getElementById('err').textContent = '';
      var body = document.getElementById('rbody').value.trim();
      if (!body) return;
      var payload = { body: body };
      if (parentReplyId) payload.parent_reply_id = parentReplyId;
      fetch(API + '/api/posts/' + encodeURIComponent(id) + '/replies', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(function (r) {
          if (r.status === 401) throw new Error('请先登录');
          if (!r.ok) {
            return r.text().then(function (t) {
              throw new Error(t || '失败 ' + r.status);
            });
          }
          document.getElementById('rbody').value = '';
          clearReplyTarget();
          loadReplies();
        })
        .catch(function (e) {
          document.getElementById('err').textContent = String(e);
        });
    };

    if (id) {
      loadMe().then(function () {
        loadPost();
        loadReplies();
      });
    }
  </script>
  <script src="/web/nav.js"></script>
</body>
</html>
