<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>注册 — Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
</head>
<body class="blink-page">
  <div class="shell shell-wide">
    <blink-nav active="register"></blink-nav>

    <main class="card auth-card">
      <h1 class="page-title" style="font-size:1.35rem;margin-top:0">创建账号</h1>
      <p class="page-lead" style="margin-bottom:1rem">邮箱 + 密码注册后，可使用「内置账号」登录发帖。</p>
      <p id="msg" class="err" role="alert"></p>
      <form id="reg" novalidate>
        <div class="field">
          <label for="email">邮箱</label>
          <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="code">邮箱验证码</label>
          <div style="display:flex;gap:.5rem;align-items:stretch">
            <input id="code" name="code" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required placeholder="6 位数字" style="flex:1" />
            <button type="button" id="send-code" class="btn">发送验证码</button>
          </div>
          <p class="field-hint">我们会给你的邮箱发送一个 6 位验证码，10 分钟内有效。</p>
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" placeholder="至少 8 位" />
          <p class="field-hint">至少 8 个字符。</p>
        </div>
        <div class="field">
          <label for="name">昵称</label>
          <input id="name" name="name" type="text" autocomplete="nickname" placeholder="展示名称（可空，将使用邮箱前缀）" />
        </div>
        <div class="btn-row">
          <button type="submit" class="btn btn-primary">注册并进入</button>
        </div>
      </form>
      <p class="auth-footer">已有账号？<a href="/web/login.html">去登录</a> · <a href="/web/forgot.html">忘记密码</a></p>
    </main>
  </div>

  <script src="/web/assets/js/api.js"></script>
  <script src="/web/assets/js/ui.js"></script>
  <script src="/web/assets/js/nav.js"></script>
  <script src="/web/assets/js/pages/register.js"></script>
</body>
</html>
