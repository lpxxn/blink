<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>敏感词管理 — Blink</title>
  <link rel="stylesheet" href="/web/common.css" />
</head>
<body class="blink-page">
  <div class="shell shell-wide">
    <nav class="top-nav">
      <a class="brand" href="/web/index.html">Blink</a>
      <a href="/web/index.html">首页</a>
      <a href="/web/register.html">注册</a>
      <a href="/web/feed.html">帖子流</a>
      <a href="/web/compose.html">发帖</a>
      <a href="/web/mine.html">我的</a>
      <a href="/web/messages.html">消息</a>
      <a href="/web/admin.html" data-blink-nav="admin" hidden>管理</a>
    </nav>

    <div id="gate">
      <h1 class="page-title">敏感词管理</h1>
      <div class="card" style="margin-top:0.75rem">
        <p class="page-lead" id="gate-lead" style="margin-top:0">正在验证权限…</p>
        <p style="margin:1rem 0 0">
          <a class="btn btn-primary" href="/web/index.html">去首页登录</a>
          <a class="btn btn-secondary" href="/web/admin.html" style="margin-left:0.35rem">返回管理后台</a>
        </p>
      </div>
    </div>

    <div id="app" hidden>
      <h1 class="page-title">敏感词管理</h1>
      <p class="page-lead" style="margin-top:0">仅 super_admin 可见；修改后会广播到所有实例。</p>
      <p id="err" class="err" role="alert"></p>

      <div class="card" style="margin-top:0.75rem">
        <h2 class="section-title" style="margin-top:0">新增</h2>
        <div class="field" style="margin-bottom:0.75rem">
          <label for="new-word">敏感词（将自动 trim + lower）</label>
          <input id="new-word" placeholder="例如：spam" />
        </div>
        <button type="button" class="btn btn-primary" id="add">添加</button>
      </div>

      <h2 class="section-title">词表</h2>
      <div class="btn-row" style="margin-bottom:0.75rem; flex-wrap:wrap; gap:0.5rem; align-items:center">
        <span id="page-meta" class="page-lead" style="margin:0"></span>
        <button type="button" class="btn btn-secondary btn-sm" id="prev">上一页</button>
        <button type="button" class="btn btn-secondary btn-sm" id="next">下一页</button>
        <button type="button" class="btn btn-secondary btn-sm" id="reload">刷新</button>
      </div>
      <div class="data-table-wrap">
        <table class="data-table" id="tbl">
          <thead><tr><th>ID</th><th>词</th><th>启用</th><th>更新时间</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    var API = '';
    var offset = 0;
    var limit = 50;
    var total = 0;

    function sid(v) { return v != null ? String(v) : ''; }

    function setGate(msg) {
      document.getElementById('gate-lead').textContent = msg;
      document.getElementById('gate').hidden = false;
      document.getElementById('app').hidden = true;
    }

    function setAuthed() {
      document.getElementById('gate').hidden = true;
      document.getElementById('app').hidden = false;
    }

    function ensureAdminJson(r, label) {
      if (r.status === 403) return Promise.reject(new Error('需要 super_admin 登录'));
      if (r.status === 401) return Promise.reject(new Error('请先登录'));
      if (!r.ok) {
        return r.text().then(function (t) {
          throw new Error(label + ' ' + r.status + (t ? ': ' + t : ''));
        });
      }
      return r.json();
    }

    function loadMe() {
      return fetch(API + '/api/me', { credentials: 'include' })
        .then(function (r) {
          if (r.status === 401) return null;
          if (!r.ok) return null;
          return r.json();
        })
        .then(function (me) {
          if (!me || me.role !== 'super_admin') {
            setGate(me ? '需要 super_admin 权限' : '请先登录');
            return null;
          }
          setAuthed();
          return me;
        })
        .catch(function () {
          setGate('请先登录');
          return null;
        });
    }

    function renderPage(d) {
      total = typeof d.total === 'number' ? d.total : 0;
      var end = Math.min(offset + limit, total);
      document.getElementById('page-meta').textContent = '共 ' + total + ' 条 · 显示 ' + (total ? offset + 1 : 0) + '–' + end;
      var tb = document.querySelector('#tbl tbody');
      tb.innerHTML = '';
      (d.words || []).forEach(function (w) {
        var tr = document.createElement('tr');
        var id = sid(w.id);
        var enabled = !!w.enabled;

        function td(text) {
          var x = document.createElement('td');
          x.textContent = text;
          return x;
        }

        tr.appendChild(td(id));
        tr.appendChild(td(w.word || ''));
        tr.appendChild(td(enabled ? '是' : '否'));
        tr.appendChild(td(w.updated_at || ''));

        var act = document.createElement('td');
        var row = document.createElement('div');
        row.style.display = 'flex';
        row.style.flexWrap = 'wrap';
        row.style.gap = '0.35rem';

        var toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'btn btn-secondary btn-sm';
        toggle.textContent = enabled ? '停用' : '启用';
        toggle.onclick = function () {
          document.getElementById('err').textContent = '';
          fetch(API + '/admin/api/sensitive_words/' + encodeURIComponent(id), {
            method: 'PATCH',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enabled: !enabled })
          })
            .then(function (r) { return ensureAdminJson(r, 'patch'); })
            .then(function () { return loadPage(); })
            .catch(function (e) { document.getElementById('err').textContent = String(e); });
        };
        row.appendChild(toggle);

        var del = document.createElement('button');
        del.type = 'button';
        del.className = 'btn btn-secondary btn-sm';
        del.textContent = '删除';
        del.onclick = function () {
          if (!window.confirm('删除敏感词 #' + id + ' ?')) return;
          document.getElementById('err').textContent = '';
          fetch(API + '/admin/api/sensitive_words/' + encodeURIComponent(id), {
            method: 'DELETE',
            credentials: 'include'
          })
            .then(function (r) {
              if (r.status === 204) return;
              return ensureAdminJson(r, 'delete');
            })
            .then(function () { return loadPage(); })
            .catch(function (e) { document.getElementById('err').textContent = String(e); });
        };
        row.appendChild(del);

        act.appendChild(row);
        tr.appendChild(act);
        tb.appendChild(tr);
      });
    }

    function loadPage() {
      var url = API + '/admin/api/sensitive_words?offset=' + encodeURIComponent(String(offset)) + '&limit=' + encodeURIComponent(String(limit));
      return fetch(url, { credentials: 'include' })
        .then(function (r) { return ensureAdminJson(r, 'list'); })
        .then(function (d) { renderPage(d); });
    }

    document.getElementById('add').onclick = function () {
      document.getElementById('err').textContent = '';
      var w = String(document.getElementById('new-word').value || '').trim();
      if (!w) return;
      fetch(API + '/admin/api/sensitive_words', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ word: w })
      })
        .then(function (r) { return ensureAdminJson(r, 'create'); })
        .then(function () {
          document.getElementById('new-word').value = '';
          offset = 0;
          return loadPage();
        })
        .catch(function (e) { document.getElementById('err').textContent = String(e); });
    };

    document.getElementById('prev').onclick = function () {
      if (offset <= 0) return;
      offset = Math.max(0, offset - limit);
      loadPage().catch(function (e) { document.getElementById('err').textContent = String(e); });
    };
    document.getElementById('next').onclick = function () {
      if (offset + limit >= total) return;
      offset = offset + limit;
      loadPage().catch(function (e) { document.getElementById('err').textContent = String(e); });
    };
    document.getElementById('reload').onclick = function () {
      loadPage().catch(function (e) { document.getElementById('err').textContent = String(e); });
    };

    setGate('正在验证权限…');
    loadMe().then(function (me) {
      if (!me) return;
      loadPage().catch(function (e) { document.getElementById('err').textContent = String(e); });
    });
  </script>
  <script src="/web/nav.js"></script>
</body>
</html>
